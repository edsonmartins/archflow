name: build-and-push

# Builda a imagem única do archflow (backend Spring Boot + SPA embutido) e
# publica em ghcr.io/integrall-tech/archflow. Em seguida dispara o receiver de
# CD na VPS, que puxa a tag recém-publicada e recria o serviço.
#
# A configuração de deploy (compose, scripts, Caddy) vive no repo archflow-devops
# e é aplicada em /opt/archflow-devops na VPS.

# Dispara APENAS em push na main. Tags (v*.*.*) NÃO disparam build — para
# publicar uma versão específica, use o workflow_dispatch abaixo informando a tag.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: Override image tag
        required: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: integrall-tech
  IMAGE: archflow

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tags.outputs.deploy_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # A imagem é publicada na org integrall-tech, mas este repo pertence a
      # outro owner (edsonmartins/archflow) — o GITHUB_TOKEN automático NÃO
      # consegue dar push lá ("the requested installation does not exist").
      # Autentique com um PAT com write:packages em integrall-tech, no secret
      # GHCR_ORG_TOKEN. Defina GHCR_ORG_USERNAME se o PAT for de outra conta.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_ORG_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_ORG_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE }}"
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            # workflow_dispatch com tag explícita (ex.: v1.2.3).
            DEPLOY_TAG="${{ github.event.inputs.tag }}"
            TAGS="$IMAGE:$DEPLOY_TAG,$IMAGE:latest"
          else
            # push na main (ou dispatch sem tag).
            DEPLOY_TAG="sha-${GITHUB_SHA::7}"
            TAGS="$IMAGE:latest,$IMAGE:$DEPLOY_TAG"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          # Tag imutável que o deploy vai fixar no .env da VPS (nunca "latest",
          # para que o rollback tenha um alvo concreto para onde voltar).
          echo "deploy_tag=$DEPLOY_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          # A VPS é amd64; buildar arm64 aqui só dobraria o tempo do build Maven.
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=archflow
          cache-to: type=gha,scope=archflow,mode=max
          provenance: false

  # CD por webhook: dispara o receiver adnanh/webhook na VPS
  # (deploy.archflow.com.br), que puxa a tag publicada e recria o serviço.
  # Requer o secret DEPLOY_TOKEN (mesmo valor de /opt/archflow-devops/.env).
  deploy:
    needs: build
    # Só a main vai a produção. Um workflow_dispatch a partir de outra branch
    # publica a imagem no GHCR mas não implanta.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://archflow.com.br
    steps:
      - name: Trigger CD webhook
        run: |
          code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            -X POST "https://deploy.archflow.com.br/hooks/deploy" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"env\":\"production\",\"component\":\"archflow\",\"tag\":\"${{ needs.build.outputs.tag }}\"}")
          echo "webhook HTTP $code"; cat /tmp/resp.txt || true
          # 200 = deploy despachado; 403 = token inválido; outros = falha.
          [ "$code" = "200" ] || { echo "::error::CD webhook falhou (HTTP $code)"; exit 1; }

      - name: Smoke test (aguarda o rollout)
        run: |
          # O webhook responde 200 imediatamente e roda o deploy em background;
          # o boot da JVM + Spring leva ~1min, daí a janela generosa.
          for i in $(seq 1 20); do
            if curl -fsS https://archflow.com.br/actuator/health >/dev/null 2>&1; then
              echo "archflow healthy"; exit 0
            fi
            echo "aguardando archflow ($i/20)…"; sleep 15
          done
          echo "::error::archflow não respondeu ao health após o deploy"
          echo "Verifique na VPS: tail -50 /tmp/archflow-deploy.log"
          exit 1
