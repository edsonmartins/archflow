spring:
  application:
    name: archflow-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-stacktrace: never

# archflow-specific configuration
archflow:
  security:
    jwt:
      secret: ${ARCHFLOW_JWT_SECRET:change-me-in-production-this-must-be-very-long-at-least-256-bits}
      access-token-expiration-seconds: ${ARCHFLOW_JWT_TTL:900}
  cors:
    allowed-origins: ${ARCHFLOW_CORS_ORIGINS:http://localhost:5173,http://localhost:5174}

logging:
  level:
    br.com.archflow: DEBUG
    org.springframework.web: INFO
