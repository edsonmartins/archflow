spring:
  application:
    name: archflow-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    default-property-inclusion: non_null
    # Frontend expects ISO8601 strings for java.time.Instant (e.g.
    # "2026-04-27T10:00:00Z"). Jackson 3 (Spring Boot 4) serializes
    # java.time as ISO-8601 strings by default, so the old
    # write-dates-as-timestamps flag is no longer needed (and its enum
    # was removed in Jackson 3).

server:
  port: ${SERVER_PORT:16080}
  error:
    include-message: always
    include-stacktrace: never

# archflow-specific configuration
archflow:
  security:
    jwt:
      secret: ${ARCHFLOW_JWT_SECRET:change-me-in-production-this-must-be-very-long-at-least-256-bits}
      access-token-expiration-seconds: ${ARCHFLOW_JWT_TTL:900}
  cors:
    allowed-origins: ${ARCHFLOW_CORS_ORIGINS:http://localhost:5173,http://localhost:5174}
  # Família de endpoints síncronos de assistência por IA (/archflow/assist/*, ADR-0004).
  # Se api-key estiver definida, o controller exige o header X-ArchFlow-Key; vazio = libera (dev).
  assist:
    api-key: ${ARCHFLOW_ASSIST_API_KEY:}

logging:
  level:
    br.com.archflow: DEBUG
    org.springframework.web: INFO
